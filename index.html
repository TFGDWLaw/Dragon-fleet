<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Fleet: PvP Online</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>DRAGON FLEET: PVP ONLINE</h1>
    <div id="status-text">Đang kết nối tới Máy chủ...</div>

    <div id="lobby-container">
        <div class="lobby-title">SẢNH CHỜ (PVP)</div>
        <div id="create-room-section">
            <button id="btn-create-room" class="lobby-btn">TẠO PHÒNG MỚI</button>
            <div id="waiting-info" style="display: none; margin-top: 20px;">
                <p>Gửi mã này cho đối thủ:</p>
                <div id="display-room-code" class="room-code-display">----</div>
                <p style="color: #2ed573; font-weight:bold;">Đang chờ đối thủ tham gia...</p>
            </div>
        </div>
        <hr style="border-color: #57606f; margin: 25px 0;">
        <div id="join-room-section">
            <input type="text" id="input-room-code" class="lobby-input" placeholder="Nhập mã phòng" maxlength="4">
            <button id="btn-join-room" class="lobby-btn">VÀO PHÒNG</button>
        </div>
    </div>

    <div id="game-container">
        <div id="my-board-wrapper" class="board-wrapper">
            <div class="panel-title">HẠM ĐỘI CỦA BẠN</div>
            <div id="game-board"></div>
        </div>
        
        <div id="control-and-skills" style="display: flex; flex-direction: column; gap: 15px;">
            <div id="control-panel">
                <div class="panel-title">DANH SÁCH RỒNG</div>
                <div id="dragon-list"></div>
                <button id="btn-rotate" class="action-btn">🔄 Xoay Rồng (Phím R): NGANG</button>
                <button id="btn-ready" class="action-btn" style="display: none; background-color: #10ac84;">✅ XẾP XONG!</button>
            </div>

            <div id="skill-panel" class="skill-container">
                <div class="panel-title" style="margin-top: 15px;">KỸ NĂNG NGUYÊN TỐ (PVP)</div>
                <button id="skill-normal" class="skill-btn selected">🎯 Đạn Thường (Vô hạn)</button>
                <button id="skill-fire" class="skill-btn">🔥 Hệ Lửa: Chữ Thập (Sạc: 1)</button>
                <button id="skill-wind" class="skill-btn">🌪️ Hệ Gió: Radar 3x3 (Sạc: 1)</button>
            </div>
        </div>

        <div id="radar-wrapper" class="board-wrapper" style="display: none;">
            <div class="panel-title" style="color: #ff4757;">RADAR TẤN CÔNG (Click để bắn)</div>
            <div id="radar-board"></div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>

</body>
</html>
